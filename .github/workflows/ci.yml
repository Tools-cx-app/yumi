name: ci-build
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "Cargo.*"
      - "module/**"
      - "webui/**"
      - "xtask/**"
      - "build.rs"
      - ".github/workflows/ci.yml"
      - ".github/test/**"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "Cargo.*"
      - "module/**"
      - "webui/**"
      - "xtask/**"
      - "build.rs"
      - ".github/workflows/ci.yml"
env:
  CARGO_TERM_COLOR: always
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache NDK
        id: cache-ndk
        uses: actions/cache@v5
        with:
          path: ~/ndk_temp
          key: ndk-${{ runner.os }}-ndk_temp
      - name: Setup ndk
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          ndk_url=$(wget -qO- https://github.com/android/ndk/releases/latest | grep -e 'https://dl.google.com/android/repository/android-ndk-.*-linux.zip' | sed -n 's/.*<a href="\([^"]*\)".*/\1/p')
          wget -O ndk.zip $ndk_url -nv
          mkdir -p ~/ndk_temp
          unzip ndk.zip -d ~/ndk_temp 2>&1 > /dev/null
          mv ~/ndk_temp/*/* ~/ndk_temp
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          targets: aarch64-linux-android
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' }}
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-multilib
          cargo install cargo-ndk --locked
      - name: Build
        run: |
          export ANDROID_NDK_HOME=$(realpath ~/ndk_temp)
          export ANDROID_NDK_ROOT=$ANDROID_NDK_HOME
          cargo xtask b
      - name: Upload release version
        uses: actions/upload-artifact@v7
        with:
          name: yumi-${{ github.run_number }}
          path: output/*.zip
          archive: false
